[bar.default]
background_opacity = 0.4999999888241291
color = "primary"
icon_color = "secondary"
radius = 70
thickness = 30
widget_spacing = 16

    [bar.default.monitor.HDMI-A-1]
    auto_hide = true
    enabled = false

[dock]
auto_hide = true
background_opacity = 0.60999998636543751
enabled = true
position = "left"
radius = 45
reserve_space = false
show_dots = true

[hot_corners]
enabled = true

    [hot_corners.bottom_right]
    action = "launcher"

    [hot_corners.top_left]
    action = "window_switcher"

    [hot_corners.top_right]
    action = "control_center"

[lockscreen_widgets]
enabled = false
schema_version = 2
widget_order = [ "lockscreen-login-box@DP-1", "lockscreen-login-box@HDMI-A-1" ]

    [lockscreen_widgets.grid]
    cell_size = 16
    major_interval = 4
    visible = true

    [lockscreen_widgets.widget."lockscreen-login-box@DP-1"]
    box_height = 70.0
    box_width = 400.0
    cx = 1280.0
    cy = 1321.0
    output = "DP-1"
    rotation = 0.0
    type = "login_box"

        [lockscreen_widgets.widget."lockscreen-login-box@DP-1".settings]
        background_color = "surface_variant"
        background_opacity = 0.88
        background_radius = 12.0
        input_opacity = 1.0
        input_radius = 6.0
        show_caps_lock = true
        show_keyboard_layout = true
        show_login_button = true
        show_password_hint = true

    [lockscreen_widgets.widget."lockscreen-login-box@HDMI-A-1"]
    box_height = 70.0
    box_width = 400.0
    cx = 540.0
    cy = 1801.0
    output = "HDMI-A-1"
    rotation = 0.0
    type = "login_box"

        [lockscreen_widgets.widget."lockscreen-login-box@HDMI-A-1".settings]
        background_color = "surface_variant"
        background_opacity = 0.88
        background_radius = 12.0
        input_opacity = 1.0
        input_radius = 6.0
        show_caps_lock = true
        show_keyboard_layout = true
        show_login_button = true
        show_password_hint = true

[plugin_settings."noctalia/wallhaven"]
browser_placement = "floating"
browser_position = "center"

[plugins]
enabled = [ "noctalia/wallhaven", "noctalia/timer" ]

[shell]
app_icon_colorize = true
corner_radius_scale = 2.0
font_family = "Hack Nerd Font"
launch_apps_as_systemd_services = true
polkit_agent = false
setup_wizard_enabled = false
telemetry_enabled = false

[theme]
builtin = "Ayu"
community_palette = "Oxocarbon"
mode = "dark"
source = "builtin"
wallpaper_scheme = "m3-content"

[wallpaper]
directory = "/home/henhal/.dotfiles/assets/wallpapers"

    [wallpaper.default]
    path = "/home/henhal/.dotfiles/assets/wallpapers/atoms.png"

    [wallpaper.last]
    path = "/home/henhal/.dotfiles/assets/wallpapers/atoms.png"

    [wallpaper.monitors.DP-1]
    path = "/home/henhal/.dotfiles/assets/wallpapers/atoms.png"

    [wallpaper.monitors.HDMI-A-1]
    path = "/home/henhal/.dotfiles/assets/wallpapers/atoms.png"

    [[wallpaper.favorite]]
    builtin_palette = "Ayu"
    palette_source = "builtin"
    path = "/home/henhal/.dotfiles/assets/wallpapers/mountains-3.jpg"
    theme_mode = "dark"

[widget.clock]
format = "{:%d.%m %H:%M}  "
